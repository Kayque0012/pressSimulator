<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>pressSimulator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <aside class="sidebar">
    <div class="brand"><span>press</span>Simulator</div>
    <button class="active">Simulador</button>
    <button>Mapa de I/O</button>
    <button>Diagnóstico</button>
    <button>Eventos</button>
  </aside>

  <main>
    <header>
      <div>
        <small>Projeto</small>
        <strong>Protótipo local</strong>
      </div>
      <div class="actions">
        <label class="file-button">
          Abrir projeto
          <input id="msxFile" type="file" accept=".msx">
        </label>
        <button id="resetScene">Restaurar</button>
      </div>
    </header>

    <section class="layout">
      <div class="machine-card">
        <div class="status"><span id="statusDot"></span><strong id="statusText">Aguardando reset</strong></div>

        <div class="machine">
          <div class="tower">
            <span id="lampRed" class="lamp red"></span>
            <span id="lampYellow" class="lamp yellow"></span>
            <span id="lampGreen" class="lamp green"></span>
          </div>

          <div class="left-controls">
            <button id="emergency" class="emergency">EMERGÊNCIA</button>
            <div class="twohand">
              <button id="leftHand">ESQ.</button>
              <button id="rightHand">DIR.</button>
            </div>
            <button id="resetButton" class="reset">RESET</button>
          </div>

          <div class="press">
            <div class="cylinder"></div>
            <div id="rod" class="rod"></div>
            <div id="ram" class="ram"></div>
            <div id="curtain" class="curtain"></div>
            <div class="die"></div>
          </div>

          <div class="right-controls">
            <label>Modo
              <select id="mode">
                <option value="manual">Manual</option>
                <option value="automatic">Automático</option>
              </select>
            </label>
            <button id="chock">Inserir calço</button>
            <button id="curtainButton">Interromper cortina</button>
          </div>
        </div>

        <div class="sensor-row">
          <div>Sensor recuado <strong id="sensorRet">ATIVO</strong></div>
          <div>Sensor avançado <strong id="sensorAdv">INATIVO</strong></div>
          <div>Válvula <strong id="valveText">INATIVA</strong></div>
        </div>
      </div>

      <div class="io-card">
        <h2>Entradas e saídas</h2>
        <table>
          <thead><tr><th>ID</th><th>Sinal</th><th>Estado</th></tr></thead>
          <tbody id="ioTable"></tbody>
        </table>
      </div>

      <div class="events-card">
        <h2>Eventos</h2>
        <div id="events"></div>
      </div>
    </section>
  </main>

 <script src="app.js"></script>
</body>
</html>
